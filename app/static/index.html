<!DOCTYPE html>
<html>
<head>
    <title>WebRTC Voice AI</title>
    <style>
        body { background: #121212; color: #00ffcc; font-family: sans-serif; text-align: center; padding: 50px; }
        button { padding: 15px 30px; font-size: 18px; background: #00ffcc; border: none; cursor: pointer; font-weight: bold;}
    </style>
</head>
<body>
    <h1>J.A.R.V.I.S. WebRTC Uplink</h1>
    <button id="startBtn">Initialize Connection</button>
    <audio id="aiAudio" autoplay></audio>

    <script>
        document.getElementById('startBtn').addEventListener('click', async () => {
            const pc = new RTCPeerConnection();
            
            // 1. Listen for the AI's audio track coming from FastAPI
            pc.ontrack = (event) => {
                console.log("Audio track received from AI!");
                document.getElementById('aiAudio').srcObject = event.streams[0];
            };

            try {
                // 2. Capture your microphone
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                stream.getTracks().forEach(track => pc.addTrack(track, stream));

                // 3. Create the WebRTC Offer
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);

                // 4. Send the offer to FastAPI
                const response = await fetch('/api/v1/webrtc/offer', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sdp: pc.localDescription.sdp,
                        type: pc.localDescription.type
                    })
                });

                // 5. Receive the answer and finalize the connection
                const answer = await response.json();
                await pc.setRemoteDescription(new RTCSessionDescription(answer));
                
                document.getElementById('startBtn').innerText = "Connected & Listening...";
                document.getElementById('startBtn').style.background = "#00ff00";

            } catch (err) {
                console.error("WebRTC Error:", err);
                alert("Failed to connect to AI. Check console.");
            }
        });
    </script>
</body>
</html>
